<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avoid Falling Objects | RevoFun</title>
  <link rel="stylesheet" href="../CSS/outcomes.css" />
  <link rel="stylesheet" href="../CSS/avoid-falling.css" />
</head>
<body>

<main class="avoid-wrapper">
  <section class="game-card">

    <h1 class="game-title">Avoid Falling Objects</h1>
    <p class="game-desc">Dodge the falling blocks. Use ← → keys or buttons.</p>

    <div class="nickname-bar">
      <label for="nicknameInput">Nickname</label>
      <div class="nickname-row">
        <input type="text" id="nicknameInput" placeholder="Enter nickname" maxlength="20" autocomplete="nickname">
        <button type="button" id="saveNicknameBtn">Save</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Score</span>
        <span id="score" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Dodged</span>
        <span id="dodged" class="stat-value">0</span>
      </div>
    </div>

    <div id="arena" class="arena" aria-label="Game arena">
      <div id="player" class="player"></div>
    </div>

    <div class="controls">
      <button type="button" id="leftBtn" aria-label="Move left">←</button>
      <button type="button" id="startBtn">Start</button>
      <button type="button" id="rightBtn" aria-label="Move right">→</button>
    </div>

    <p id="status" class="game-status" aria-live="polite">Press Start to play!</p>

    <div class="leaderboard-section">
      <h3>🏆 Leaderboard</h3>
      <ul id="leaderboard"></ul>
      <button type="button" id="clearLeaderboardBtn" class="clear-leaderboard-btn">Clear leaderboard</button>
    </div>

    <a href="../index.html" class="back-link">⬅ Back to Home</a>

  </section>
</main>

<script src="../JS/utils.js"></script>
<script src="../JS/avoid-falling.js"></script>
</body>
</html>
