<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Card | RevoFun</title>
  <link rel="stylesheet" href="../CSS/outcomes.css" />
  <link rel="stylesheet" href="../CSS/memory-card.css" />
</head>
<body>

<main class="memory-wrapper">
  <section class="game-card">

    <h1 class="game-title">Memory Card</h1>
    <p class="game-desc">Match all pairs with as few moves as possible.</p>

    <div class="nickname-bar">
      <label for="nicknameInput">Nickname</label>
      <div class="nickname-row">
        <input type="text" id="nicknameInput" placeholder="Enter nickname" maxlength="20" autocomplete="nickname">
        <button type="button" id="saveNicknameBtn">Save</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Moves</span>
        <span id="moves" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Pairs</span>
        <span id="pairs" class="stat-value">0/4</span>
      </div>
    </div>

    <div id="board" class="memory-board" aria-label="Memory card grid"></div>

    <p id="status" class="game-status" aria-live="polite">Find matching pairs!</p>

    <button type="button" id="restartBtn">Restart</button>

    <div class="leaderboard-section">
      <h3>🏆 Leaderboard</h3>
      <ul id="leaderboard"></ul>
      <button type="button" id="clearLeaderboardBtn" class="clear-leaderboard-btn">Clear leaderboard</button>
    </div>

    <a href="../index.html" class="back-link">⬅ Back to Home</a>

  </section>
</main>

<script src="../JS/utils.js"></script>
<script src="../JS/memory-card.js"></script>
</body>
</html>
