<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors | RevoFun</title>
  <link rel="stylesheet" href="../CSS/rps.css">
</head>
<body>

  <main class="game-wrapper">
    <section class="game-card">
      <h1 class="game-title">Rock Paper Scissors</h1>
      <p class="game-subtitle">Choose your move</p>

      <div class="nickname-bar">
        <label for="nicknameInput">Nickname</label>
        <div class="nickname-row">
          <input type="text" id="nicknameInput" placeholder="Enter nickname" maxlength="20" autocomplete="nickname">
          <button type="button" id="saveNicknameBtn">Save</button>
        </div>
      </div>

      <div class="rps-buttons">
        <button type="button" class="choice" data-choice="rock" aria-label="Rock">✊</button>
        <button type="button" class="choice" data-choice="paper" aria-label="Paper">✋</button>
        <button type="button" class="choice" data-choice="scissors" aria-label="Scissors">✌️</button>
        <button type="button" id="restartBtn">Restart</button>
      </div>

      <p id="result" aria-live="polite"></p>
      <p>Wins: <span id="wins">0</span></p>
      <p class="score-hint">Save score: press Restart</p>

      <ul id="leaderboard"></ul>
      <button type="button" id="clearLeaderboardBtn" class="clear-leaderboard-btn">Clear leaderboard</button>
      
      <a href="../index.html" class="back-link">⬅ Back to Home</a>
    </section>
  </main>

  <script src="../JS/utils.js"></script>
  <script src="../JS/rps.js"></script>
</body>
</html>
